name: Build and Push Docker Image with Tag

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Image Tag
      id: vars
      run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/django-devops-demo:$TAG .
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/django-devops-demo:latest .

    - name: Push Image
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/django-devops-demo:$TAG
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/django-devops-demo:latest