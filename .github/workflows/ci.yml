name: Build and Push Docker Image with Tag

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout repository code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2️⃣ Create short commit SHA tag
    - name: Set Image Tag
      run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

    # 3️⃣ Login to Docker Hub using secrets
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 4️⃣ Build Docker Image (IMPORTANT: context '.' included)
    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/django-devops-demo:$TAG .
        docker tag ${{ secrets.DOCKERHUB_USERNAME }}/django-devops-demo:$TAG ${{ secrets.DOCKERHUB_USERNAME }}/django-devops-demo:latest

    # 5️⃣ Push both tags to Docker Hub
    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/django-devops-demo:$TAG
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/django-devops-demo:latest