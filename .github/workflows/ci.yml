\name: Build and Push Docker Image with Tag

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout Code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2️⃣ Setup Docker Buildx (IMPORTANT FIX)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3️⃣ Create short commit SHA tag
    - name: Set Image Tag
      run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

    # 4️⃣ Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 5️⃣ Build Image using Buildx (correct way in CI)
    - name: Build Docker Image
      run: |
        docker buildx build --load \
        -t ${{ secrets.DOCKERHUB_USERNAME }}/django-devops-demo:$TAG \
        -t ${{ secrets.DOCKERHUB_USERNAME }}/django-devops-demo:latest \
        .

    # 6️⃣ Push Image
    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/django-devops-demo:$TAG
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/django-devops-demo:latest